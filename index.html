<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Запуск College HelpDesk</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #16202f;
        background: linear-gradient(135deg, #f7faff, #dce8ff);
        font: 16px/1.5 "Segoe UI", Arial, sans-serif;
      }

      main {
        width: min(620px, calc(100% - 36px));
        border: 1px solid #dce5f2;
        border-radius: 28px;
        padding: clamp(24px, 5vw, 48px);
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 60px rgba(18, 37, 72, 0.12);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(30px, 6vw, 54px);
        line-height: 1.05;
      }

      code {
        border-radius: 8px;
        padding: 2px 6px;
        background: #eef3ff;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        border-radius: 14px;
        padding: 0 18px;
        color: #fff;
        background: #3157d5;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>College HelpDesk</p>
      <h1>Это Flask-приложение.</h1>
      <p>Сначала запустите сервер из папки проекта:</p>
      <p><code>pip install -r requirements.txt</code></p>
      <p><code>python app.py</code></p>
      <p>После запуска откройте локальный адрес сервиса.</p>
      <a href="http://127.0.0.1:5000/">Открыть College HelpDesk</a>
    </main>
  </body>
</html>
